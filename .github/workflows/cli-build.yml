name: Build CLI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Pin the Linux runner to the oldest GitHub-supported Ubuntu so the
          # produced binary links against glibc 2.35 instead of glibc 2.39
          # (which `ubuntu-latest` would give). 2.35 covers Ubuntu 22.04+,
          # Debian 12+, Fedora 36+, RHEL/Alma/Rocky 9+ -- effectively every
          # supported distro from 2022 onward. Older systems can still build
          # from source.
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            asset_name: ocpq_cli-linux-x86_64
            binary_name: ocpq_cli
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: ocpq_cli-windows-x86_64.exe
            binary_name: ocpq_cli.exe
          # macos-latest hosts are arm64 (M-series) since 2024. Apple's
          # toolchain happily cross-compiles to x86_64 from arm64, so we
          # cover Intel Macs from the same runner without spinning up a
          # second host (matches the tauri-build-app.yml pattern).
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_name: ocpq_cli-macos-aarch64
            binary_name: ocpq_cli
          - os: macos-latest
            target: x86_64-apple-darwin
            asset_name: ocpq_cli-macos-x86_64
            binary_name: ocpq_cli
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build CLI
        run: cargo build --release --locked -p ocpq_cli --target ${{ matrix.target }}

      - name: Stage binary
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "dist/${{ matrix.asset_name }}"

      - name: Upload as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}
          if-no-files-found: error

      - name: Attach to GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.asset_name }}
          fail_on_unmatched_files: true
